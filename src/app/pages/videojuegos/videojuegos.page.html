<ion-header>
  <ion-toolbar>
    <ion-title>Venta de Videojuegos</ion-title>
    <ion-button slot="start">
      <ion-back-button defaultHref="/tabs/tab1/apilibros"> Ir a libros</ion-back-button>
    </ion-button>

    <ion-button slot="end" routerLink="/login">
      Cerrar sesión
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list>
    <ion-item *ngFor="let juego of videojuegos" class="card-juego">
      <ion-label>
        <h2>{{ juego.titulo }}</h2>
        <img [src]="juego.portada" alt="{{ juego.titulo }}" style="max-width: 100px; max-height: 100px; justify-items: center;">
        <!-- AUDIO -->
        <div *ngIf="juego.audio">
          <audio controls [src]="juego.audio">
            Tu navegador no soporta audio.
          </audio>
        </div>
        <p>{{ juego.descripcion }} | {{ juego.categoria }}</p>
        
        <ion-button
        *ngIf="juego.link_referencia"
        (click)="mostrarVideo(juego.link_referencia)">
          Ver trailer
        </ion-button>

        <div *ngIf="videoUrl === juego.link_referencia">
          <iframe
            width="100%"
            height="200"
            [src]="getVideoUrl(juego.link_referencia)"
            frameborder="0"
            allowfullscreen>
          </iframe>
        </div>

        <!-- BOTÓN MOSTRAR -->
        <ion-button
          *ngIf="juego.imagen"
          (click)="toggleImagen(juego.id!)"
          color="secondary"
        >
          {{ imagenVisible === juego.id ? 'Ocultar Imagen' : 'Ver Imagen' }}
        </ion-button>

        <!-- IMAGEN -->
        <div *ngIf="imagenVisible === juego.id">
          <img
            [src]="juego.imagen"
            style="
              width: 100%;
              max-width: 300px;
              margin-top: 10px;
              border-radius: 10px;
            "
          >
        </div>
        
      </ion-label>

      <div class="acciones">
        <ion-button [routerLink]="['/tabs/tab1/videojuego-form', juego.id]">
          Editar
        </ion-button>

        <ion-button (click)="eliminar(juego.id!)">
          Eliminar
        </ion-button>
      </div>

    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/tabs/tab1/videojuego-form">
      +
    </ion-fab-button>
  </ion-fab>

</ion-content>
